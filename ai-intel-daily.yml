name: AI Intel Brief

on:
  schedule:
    # Runs at 7:00 AM Central Time (13:00 UTC) every weekday
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Manual trigger for daily brief'
        required: false
        default: 'manual'

jobs:
  generate-brief:
    name: Generate Daily Brief
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ANTHROPIC_MODEL: claude-sonnet-4-20250514

      # Optional: Deploy to GitHub Pages after build
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
